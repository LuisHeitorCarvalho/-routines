<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Routine</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght,SOFT,WONK@9..144,600..900,50..100,0..1&family=JetBrains+Mono:wght@400;500;600;700&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Sora:wght@500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --paper: #f6f4ee;
    --card: #ffffff;
    --ink: #15151a;
    --ink-2: #5b5b66;
    --ink-3: #9c9aa0;
    --line: #e6e3da;
    --line-strong: #cfcbbc;

    --red: #dd3b23;
    --red-soft: rgba(221, 59, 35, 0.08);
    --yellow: #f5b700;
    --yellow-ink: #8a6400;
    --yellow-soft: rgba(245, 183, 0, 0.14);
    --blue: #1e4fd8;
    --blue-soft: rgba(30, 79, 216, 0.08);

    --font-display: 'Fraunces', Georgia, serif;
    --font-ui: 'Plus Jakarta Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    --font-clock: 'Sora', 'Plus Jakarta Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    --font-mono: 'JetBrains Mono', ui-monospace, SFMono-Regular, Menlo, monospace;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  html { scroll-behavior: smooth; }

  body {
    min-height: 100vh;
    font-family: var(--font-ui);
    color: var(--ink);
    background-color: var(--paper);
    background-image: radial-gradient(circle, rgba(21,21,26,0.06) 1px, transparent 1px);
    background-size: 22px 22px;
    line-height: 1.5;
    letter-spacing: -0.005em;
  }

  .mono {
    font-family: var(--font-mono);
    font-variant-numeric: tabular-nums;
    font-feature-settings: "tnum" 1, "zero" 1;
  }

  .masthead-bar { display: flex; height: 4px; width: 100%; }
  .masthead-bar span { flex: 1; }
  .masthead-bar span:nth-child(1) { background: var(--red); }
  .masthead-bar span:nth-child(2) { background: var(--yellow); }
  .masthead-bar span:nth-child(3) { background: var(--blue); }

  .wrap {
    width: min(760px, calc(100% - 32px));
    margin: 0 auto;
    padding: 26px 0 60px;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: none; }
  }

  header.top {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    margin-bottom: 28px;
    animation: fadeUp 0.5s ease both;
  }

  .brand { display: flex; align-items: center; gap: 9px; padding-top: 4px; }

  .brand-mark { display: flex; gap: 3px; }
  .brand-mark span { width: 8px; height: 8px; display: block; }
  .brand-mark span:nth-child(1) { background: var(--red); }
  .brand-mark span:nth-child(2) { background: var(--yellow); }
  .brand-mark span:nth-child(3) { background: var(--blue); }

  .brand-word {
    font-family: var(--font-ui);
    font-weight: 800;
    font-size: 12px;
    letter-spacing: 0.24em;
    text-transform: uppercase;
    color: var(--ink-2);
  }

  .brand-star {
    display: inline-grid;
    place-items: center;
    width: 18px;
    height: 18px;
    margin-left: -2px;
    color: var(--yellow-ink);
    font-family: var(--font-display);
    font-size: 13px;
    line-height: 1;
    transform: translateY(-1px);
  }

  .clock-block { text-align: right; }

  .clock {
    font-family: var(--font-clock);
    font-weight: 600;
    font-size: clamp(25px, 6vw, 32px);
    line-height: 0.98;
    letter-spacing: -0.045em;
    font-variant-numeric: tabular-nums;
    font-feature-settings: "tnum" 1, "zero" 0;
    color: var(--ink);
  }

  .date {
    margin-top: 3px;
    font-family: var(--font-ui);
    font-size: 12px;
    font-weight: 600;
    color: var(--ink-3);
  }

  .view-controls {
    display: flex;
    justify-content: flex-end;
    margin: -14px 0 16px;
    animation: fadeUp 0.5s ease 0.04s both;
  }

  .focus-toggle {
    appearance: none;
    border: 1px solid var(--line-strong);
    background: var(--card);
    color: var(--ink);
    cursor: pointer;
    font-family: var(--font-ui);
    font-size: 10.5px;
    font-weight: 800;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    padding: 10px 13px;
    transition: border-color 180ms ease, background 180ms ease, transform 180ms ease;
  }

  .focus-toggle:hover {
    border-color: var(--blue);
    background: var(--blue-soft);
  }

  .focus-toggle:active { transform: translateY(1px); }

  .focus-toggle:focus-visible {
    outline: 3px solid var(--yellow-soft);
    outline-offset: 3px;
  }

  body.focus-mode .wrap {
    min-height: calc(100vh - 4px);
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding: 28px 0;
  }

  body.focus-mode header.top,
  body.focus-mode .day-progress,
  body.focus-mode .timeline,
  body.focus-mode footer.foot {
    display: none;
  }

  body.focus-mode .view-controls {
    position: fixed;
    top: 22px;
    right: max(22px, calc((100vw - 1500px) / 2 + 22px));
    z-index: 30;
    justify-content: flex-end;
    margin: 0;
    animation: none;
  }

  body.focus-mode .focus-toggle {
    width: 34px;
    height: 34px;
    display: grid;
    place-items: center;
    padding: 0;
    border-color: rgba(207, 203, 188, 0.72);
    background: rgba(255, 255, 255, 0.62);
    color: var(--yellow-ink);
    font-family: var(--font-display);
    font-size: 0;
    letter-spacing: 0;
    line-height: 1;
    opacity: 0.42;
    backdrop-filter: blur(6px);
  }

  body.focus-mode .focus-toggle::before {
    content: "✦";
    display: block;
    font-size: 17px;
    line-height: 1;
    transform: translateY(-0.5px);
  }

  body.focus-mode .focus-toggle:hover,
  body.focus-mode .focus-toggle:focus-visible {
    opacity: 1;
    border-color: var(--yellow);
    background: rgba(255, 255, 255, 0.9);
    color: var(--yellow-ink);
  }

  body.focus-mode .hero {
    grid-template-columns: 1.15fr 0.85fr;
    gap: 16px;
    margin-bottom: 0;
  }

  body.focus-mode .hero-now { padding: 34px 30px; }
  body.focus-mode .hero-next { padding: 30px 24px; }

  body.focus-mode .hero-title {
    font-size: clamp(34px, 8vw, 58px);
    max-width: 12ch;
  }

  body.focus-mode .hero-next-title {
    font-size: clamp(24px, 5vw, 34px);
  }

  .hero {
    display: grid;
    grid-template-columns: 1.35fr 1fr;
    gap: 14px;
    margin-bottom: 16px;
    animation: fadeUp 0.5s ease 0.08s both;
  }

  .hero-now {
    --accent: var(--line-strong);
    position: relative;
    overflow: hidden;
    background: var(--card);
    border: 1px solid var(--line);
    border-left: 6px solid var(--accent);
    padding: 26px 24px;
  }

  .hero-now::after {
    content: "✦";
    position: absolute;
    top: 14px;
    right: 18px;
    color: var(--yellow);
    font-family: var(--font-display);
    font-size: 28px;
    line-height: 1;
    opacity: 0.28;
    pointer-events: none;
  }

  .hero-now.mode-active { --accent: var(--red); }
  .hero-now.mode-phone { --accent: var(--blue); }
  .hero-now.mode-transition { --accent: var(--blue); }
  .hero-now.mode-before { --accent: var(--blue); }
  .hero-now.mode-sleep { --accent: var(--ink); }

  .tag {
    display: inline-flex;
    align-items: center;
    gap: 7px;
    font-family: var(--font-ui);
    font-size: 10.5px;
    font-weight: 800;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 13px;
  }

  .tag::before {
    content: "";
    width: 7px;
    height: 7px;
    background: var(--accent);
    flex-shrink: 0;
  }

  .hero-title {
    font-family: var(--font-display);
    font-weight: 850;
    font-size: clamp(28px, 6.8vw, 44px);
    line-height: 0.98;
    letter-spacing: -0.04em;
    font-optical-sizing: auto;
    font-variation-settings: "SOFT" 82, "WONK" 1;
    max-width: 11ch;
  }

  .hero-meta {
    display: flex;
    flex-wrap: wrap;
    gap: 16px;
    margin-top: 17px;
    font-family: var(--font-mono);
    font-size: 12px;
    letter-spacing: -0.025em;
  }

  .hero-meta .k1 { color: var(--ink-2); }
  .hero-meta .k2 { color: var(--accent); font-weight: 700; }

  .block-progress { margin-top: 18px; display: flex; align-items: center; gap: 10px; }
  .block-progress-track { flex: 1; height: 4px; background: var(--line); overflow: hidden; }
  .block-progress-fill { height: 100%; width: 0%; background: var(--accent); transition: width 600ms ease; }
  .block-progress-label { font-size: 11px; color: var(--ink-3); min-width: 34px; text-align: right; }

  .hero-next {
    position: relative;
    overflow: hidden;
    background: var(--card);
    border: 1px solid var(--line);
    border-left: 6px solid var(--yellow);
    padding: 22px 20px;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
  }

  .hero-next .tag { color: var(--yellow-ink); }
  .hero-next .tag::before { background: var(--yellow); }

  .hero-next-title {
    font-family: var(--font-display);
    font-weight: 750;
    font-size: 22px;
    line-height: 1.03;
    letter-spacing: -0.035em;
    font-optical-sizing: auto;
    font-variation-settings: "SOFT" 76, "WONK" 1;
  }

  .hero-next-time {
    margin-top: 15px;
    font-size: 12px;
    font-weight: 600;
    letter-spacing: -0.025em;
    color: var(--ink-2);
  }

  .day-progress {
    background: var(--card);
    border: 1px solid var(--line);
    border-top: 3px solid var(--blue);
    padding: 16px 20px;
    margin-bottom: 30px;
    animation: fadeUp 0.5s ease 0.14s both;
  }

  .day-progress-head {
    display: flex;
    justify-content: space-between;
    font-family: var(--font-ui);
    font-size: 10.5px;
    font-weight: 800;
    letter-spacing: 0.13em;
    text-transform: uppercase;
    color: var(--ink-2);
    margin-bottom: 9px;
  }

  .day-progress-head #dayPercent { color: var(--blue); font-weight: 600; }

  .day-progress-track { height: 6px; background: var(--line); overflow: hidden; }
  .day-progress-fill { height: 100%; width: 0%; background: var(--blue); transition: width 600ms ease; }

  .day-progress-foot {
    display: flex;
    justify-content: space-between;
    margin-top: 9px;
    font-size: 11px;
    color: var(--ink-3);
  }

  .timeline { animation: fadeUp 0.5s ease 0.2s both; }

  .period { margin-bottom: 22px; }

  .period-head {
    appearance: none;
    width: 100%;
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 0 6px 9px;
    border: 0;
    border-bottom: 1px solid var(--line-strong);
    margin-bottom: 4px;
    background: transparent;
    color: inherit;
    text-align: left;
    cursor: pointer;
    font-family: inherit;
    transition: background 180ms ease, border-color 180ms ease;
  }

  .period-head:hover {
    background: rgba(255, 255, 255, 0.45);
    border-bottom-color: var(--blue);
  }

  .period-head:focus-visible {
    outline: 3px solid var(--yellow-soft);
    outline-offset: 3px;
  }

  .period.collapsed .rows { display: none; }

  .period.collapsed .period-head {
    margin-bottom: 0;
    border-bottom-color: var(--line);
  }

  .period-badge {
    width: 26px;
    height: 26px;
    display: grid;
    place-items: center;
    background: var(--blue-soft);
    color: var(--blue);
    font-size: 12px;
    font-weight: 700;
    flex-shrink: 0;
  }

  .period-title {
    font-family: var(--font-ui);
    font-size: 13px;
    font-weight: 800;
    letter-spacing: 0.12em;
    text-transform: uppercase;
  }

  .period-range {
    margin-left: auto;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: -0.035em;
    color: var(--ink-3);
  }

  .period-chevron {
    width: 26px;
    height: 26px;
    display: grid;
    place-items: center;
    flex-shrink: 0;
    border: 1px solid var(--line);
    color: var(--ink-2);
    line-height: 1;
    transform-origin: center center;
    transition: transform 180ms ease, border-color 180ms ease, color 180ms ease;
  }

  .period-chevron svg {
    width: 12px;
    height: 12px;
    display: block;
    overflow: visible;
    transform: translateY(0.5px);
  }

  .period-chevron path {
    fill: none;
    stroke: currentColor;
    stroke-width: 2;
    stroke-linecap: round;
    stroke-linejoin: round;
  }

  .period-head:hover .period-chevron {
    border-color: var(--blue);
    color: var(--blue);
  }

  .period.collapsed .period-chevron {
    transform: rotate(-90deg);
  }

  .row {
    display: grid;
    /*
      The time column cannot be fixed at 62px because ranges such as
      “18:20 – 18:30” are wider and can overlap the title column.
      max-content lets the time take exactly the space it needs.
    */
    grid-template-columns: max-content minmax(0, 1fr) auto;
    column-gap: 18px;
    row-gap: 6px;
    align-items: center;
    padding: 12px 6px;
    border-bottom: 1px solid var(--line);
    transition: background 200ms ease, opacity 200ms ease;
  }

  .row:last-child { border-bottom: none; }

  .row-time {
    font-size: 11.5px;
    font-weight: 600;
    letter-spacing: -0.035em;
    color: var(--ink-2);
    font-variant-numeric: tabular-nums;
    white-space: nowrap;
  }

  .row-title-wrap {
    display: flex;
    align-items: center;
    gap: 8px;
    flex-wrap: wrap;
    min-width: 0;
  }

  .row-title {
    font-family: var(--font-ui);
    font-size: 15px;
    font-weight: 650;
    letter-spacing: -0.02em;
    overflow-wrap: anywhere;
  }

  .row-flag {
    font-family: var(--font-ui);
    font-size: 8.5px;
    font-weight: 800;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--blue);
    border: 1px solid var(--blue);
    padding: 1px 6px;
  }

  .row-status {
    justify-self: end;
    font-family: var(--font-ui);
    font-size: 9.5px;
    font-weight: 800;
    letter-spacing: 0.11em;
    text-transform: uppercase;
    color: var(--ink-3);
    white-space: nowrap;
  }

  .row.current {
    --accent: var(--red);
    background: var(--red-soft);
    border-left: 3px solid var(--accent);
    padding-left: 9px;
    margin-left: -1px;
  }
  .row.current.phone { --accent: var(--blue); background: var(--blue-soft); }
  .row.current .row-title { font-weight: 800; }
  .row.current .row-title-wrap::before {
    content: "✦";
    color: var(--accent);
    font-family: var(--font-display);
    font-size: 11px;
    line-height: 1;
    margin-right: -2px;
    transform: translateY(-1px);
  }
  .row.current .row-status { color: var(--accent); }

  .row.next {
    background: var(--yellow-soft);
    border-left: 3px solid var(--yellow);
    padding-left: 9px;
    margin-left: -1px;
  }
  .row.next .row-status { color: var(--yellow-ink); }

  .row.done { opacity: 0.4; }
  .row.done .row-title { text-decoration: line-through; text-decoration-color: var(--ink-3); }

  footer.foot {
    text-align: center;
    margin-top: 30px;
    font-size: 10.5px;
    font-weight: 600;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    color: var(--ink-3);
  }

  @media (min-width: 900px) {
    .wrap {
      width: min(1120px, calc(100% - 56px));
      padding-top: 30px;
    }

    header.top { margin-bottom: 18px; }

    .hero {
      grid-template-columns: minmax(0, 1.55fr) minmax(320px, 0.95fr);
      gap: 18px;
    }

    .hero-now { padding: 32px 30px; }
    .hero-next { padding: 28px 26px; }
    .hero-title {
      font-size: clamp(38px, 4.6vw, 58px);
      max-width: none;
    }
    .hero-next-title { font-size: clamp(26px, 2.4vw, 34px); }

    .day-progress {
      padding: 18px 24px;
      margin-bottom: 34px;
    }
  }

  @media (min-width: 1180px) {
    .wrap {
      width: min(1440px, calc(100% - 80px));
    }

    .timeline {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 28px;
      align-items: start;
    }

    .period { margin-bottom: 0; }
    .period-head { padding: 0 8px 11px; }

    .row {
      grid-template-columns: max-content minmax(0, 1fr);
      column-gap: 14px;
      padding: 13px 8px;
      align-items: start;
    }

    .row-status {
      grid-column: 2;
      justify-self: start;
      margin-top: -2px;
      font-size: 8.5px;
    }

    .row.current,
    .row.next {
      padding-left: 11px;
    }
  }

  @media (min-width: 1500px) {
    .wrap {
      width: min(1540px, calc(100% - 112px));
    }

    .timeline { gap: 34px; }

    .row {
      grid-template-columns: max-content minmax(0, 1fr) auto;
      column-gap: 18px;
    }

    .row-status {
      grid-column: auto;
      justify-self: end;
      margin-top: 0;
      font-size: 9.5px;
    }
  }

  @media (max-width: 640px) {
    .hero { grid-template-columns: 1fr; }
    .hero-now { padding: 22px 18px; }
    .hero-title { max-width: none; }
    .hero-next { padding: 18px; }
    .row {
      grid-template-columns: minmax(0, 1fr) auto;
      column-gap: 12px;
      align-items: start;
    }
    .row-time {
      grid-column: 1 / -1;
      order: -1;
    }

    .view-controls { justify-content: stretch; }
    .focus-toggle { width: 100%; }

    body.focus-mode .view-controls {
      top: 16px;
      right: 16px;
    }
    body.focus-mode .focus-toggle {
      width: 32px;
      height: 32px;
    }

    body.focus-mode .hero { grid-template-columns: 1fr; }
    body.focus-mode .hero-now { padding: 28px 22px; }
    body.focus-mode .hero-next { padding: 22px; }
  }

  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after { animation: none !important; transition: none !important; scroll-behavior: auto !important; }
  }
</style>
</head>
<body>
<div class="masthead-bar"><span></span><span></span><span></span></div>

<div class="wrap">
  <header class="top">
    <div class="brand">
      <div class="brand-mark"><span></span><span></span><span></span></div>
      <span class="brand-word">Routine</span><span class="brand-star" aria-hidden="true">✦</span>
    </div>
    <div class="clock-block">
      <div class="clock mono" id="clock">--:--:--</div>
      <div class="date" id="dateLine">—</div>
    </div>
  </header>

  <div class="view-controls">
    <button class="focus-toggle" id="focusToggle" type="button" aria-pressed="false" aria-label="Show only now">Show only now</button>
  </div>

  <section class="hero">
    <div class="hero-now" id="heroNow">
      <div class="tag" id="stateLabel">Now</div>
      <h1 class="hero-title" id="currentTitle">Loading…</h1>
      <div class="hero-meta">
        <span class="k1 mono" id="currentTime">--:--</span>
        <span class="k2 mono" id="remainingTime">--</span>
      </div>
      <div class="block-progress" id="blockProgressRow">
        <div class="block-progress-track"><div class="block-progress-fill" id="blockFill"></div></div>
        <span class="block-progress-label mono" id="blockPercent">0%</span>
      </div>
    </div>

    <div class="hero-next">
      <div class="tag">Next</div>
      <div class="hero-next-title" id="nextTitle">—</div>
      <div class="hero-next-time mono" id="nextTime">--:--</div>
    </div>
  </section>

  <section class="day-progress">
    <div class="day-progress-head">
      <span>Day progress</span>
      <span class="mono" id="dayPercent">0%</span>
    </div>
    <div class="day-progress-track"><div class="day-progress-fill" id="dayFill"></div></div>
    <div class="day-progress-foot mono">
      <span>04:30</span>
      <span id="dayStatus">Not started yet</span>
      <span>20:45</span>
    </div>
  </section>

  <main class="timeline">
    <section class="period" data-period-key="manha">
      <button class="period-head" type="button" aria-expanded="true" aria-controls="manhaRows">
        <span class="period-badge">M</span>
        <span class="period-title">Morning</span>
        <span class="period-range mono">04:30 – 12:15</span>
        <span class="period-chevron" aria-hidden="true"><svg viewBox="0 0 12 12" focusable="false"><path d="M3 4.5L6 7.5L9 4.5"></path></svg></span>
      </button>
      <div class="rows" id="manhaRows"></div>
    </section>

    <section class="period" data-period-key="tarde">
      <button class="period-head" type="button" aria-expanded="true" aria-controls="tardeRows">
        <span class="period-badge">T</span>
        <span class="period-title">Afternoon</span>
        <span class="period-range mono">12:15 – 18:00</span>
        <span class="period-chevron" aria-hidden="true"><svg viewBox="0 0 12 12" focusable="false"><path d="M3 4.5L6 7.5L9 4.5"></path></svg></span>
      </button>
      <div class="rows" id="tardeRows"></div>
    </section>

    <section class="period" data-period-key="noite">
      <button class="period-head" type="button" aria-expanded="true" aria-controls="noiteRows">
        <span class="period-badge">N</span>
        <span class="period-title">Evening</span>
        <span class="period-range mono">18:05 – 20:45+</span>
        <span class="period-chevron" aria-hidden="true"><svg viewBox="0 0 12 12" focusable="false"><path d="M3 4.5L6 7.5L9 4.5"></path></svg></span>
      </button>
      <div class="rows" id="noiteRows"></div>
    </section>
  </main>

</div>

<script>
  const routine = [
    { start: "04:30", end: "04:50", title: "Wake up, brush teeth and tidy the room", period: "Morning" },
    { start: "05:00", end: "06:00", title: "Workout", period: "Morning" },
    { start: "06:00", end: "06:30", title: "Shower and breakfast", period: "Morning" },
    { start: "06:30", end: "07:20", title: "Deep study", period: "Morning" },
    { start: "07:30", end: "12:15", title: "School", period: "Morning" },
    { start: "12:15", end: "12:45", title: "Lunch", period: "Afternoon" },
    { start: "12:45", end: "13:00", title: "Rest", period: "Afternoon", phone: true },
    { start: "13:00", end: "13:25", title: "House chores", period: "Afternoon" },
    { start: "13:30", end: "18:00", title: "Work", period: "Afternoon" },
    { start: "18:05", end: "18:20", title: "Phone", period: "Evening", phone: true },
    { start: "18:20", end: "18:30", title: "Meal", period: "Evening" },
    { start: "18:30", end: "19:45", title: "Main study", period: "Evening" },
    { start: "19:45", end: "19:50", title: "Prepare for tomorrow", period: "Evening" },
    { start: "19:50", end: "20:00", title: "Daily review", period: "Evening" },
    { start: "20:00", end: "20:45", title: "Reading", period: "Evening" },
    { start: "20:45", end: "24:00", title: "Sleep", period: "Evening", sleep: true }
  ];

  const periodTargets = {
    "Morning": document.getElementById("manhaRows"),
    "Afternoon": document.getElementById("tardeRows"),
    "Evening": document.getElementById("noiteRows")
  };

  const months = ["January", "February", "March", "April", "May", "June", "July", "August", "September", "October", "November", "December"];
  const weekdays = ["Sunday", "Monday", "Tuesday", "Wednesday", "Thursday", "Friday", "Saturday"];

  const routineStartMin = timeToMinutes("04:30");
  const routineEndMin = timeToMinutes("20:45");

  let hasAutoScrolled = false;

  const focusToggle = document.getElementById("focusToggle");
  const focusStorageKey = "routineFocusMode";
  const periodStorageKey = "routineCollapsedPeriods";

  function pad(v) { return String(v).padStart(2, "0"); }
  function cap(s) { return s.charAt(0).toUpperCase() + s.slice(1); }

  function timeToMinutes(time) {
    const [h, m] = time.split(":").map(Number);
    return h * 60 + m;
  }

  function minutesToText(total) {
    if (total <= 0) return "now";
    const h = Math.floor(total / 60);
    const m = total % 60;
    if (h && m) return h + "h " + m + "min";
    if (h) return h + "h";
    return m + "min";
  }

  function formatRange(item) {
    if (item.sleep) return "20:45+";
    return item.start + " – " + item.end;
  }

  function buildRows() {
    routine.forEach((item, index) => {
      const row = document.createElement("div");
      row.className = "row future" + (item.phone ? " phone" : "");
      row.dataset.index = index;
      row.id = "row-" + index;

      const flag = item.phone ? '<span class="row-flag">phone</span>' : "";

      row.innerHTML =
        '<div class="row-time mono">' + formatRange(item) + '</div>' +
        '<div class="row-title-wrap"><span class="row-title">' + item.title + '</span>' + flag + '</div>' +
        '<div class="row-status"></div>';

      periodTargets[item.period].appendChild(row);
    });
  }

  function findCurrentAndNext(minutes) {
    if (minutes < routineStartMin) {
      return { mode: "before", current: null, currentIndex: null, next: routine[0], nextIndex: 0 };
    }

    for (let i = 0; i < routine.length; i++) {
      const item = routine[i];
      const start = timeToMinutes(item.start);
      const end = item.end === "24:00" ? 1440 : timeToMinutes(item.end);

      if (minutes >= start && minutes < end) {
        return {
          mode: item.sleep ? "sleep" : "active",
          current: item,
          currentIndex: i,
          next: routine[i + 1] || routine[0],
          nextIndex: i + 1 < routine.length ? i + 1 : 0
        };
      }

      if (minutes < start) {
        return { mode: "transition", current: null, currentIndex: null, next: item, nextIndex: i };
      }
    }

    return { mode: "sleep", current: routine[routine.length - 1], currentIndex: routine.length - 1, next: routine[0], nextIndex: 0 };
  }

  function updateClock(now) {
    document.getElementById("clock").textContent =
      pad(now.getHours()) + ":" + pad(now.getMinutes()) + ":" + pad(now.getSeconds());
    document.getElementById("dateLine").textContent =
      weekdays[now.getDay()] + ", " + months[now.getMonth()] + " " + now.getDate() + ", " + now.getFullYear();
  }

  function activityProgress(item, minutes) {
    const start = timeToMinutes(item.start);
    const end = item.end === "24:00" ? 1440 : timeToMinutes(item.end);
    return Math.max(0, Math.min(100, ((minutes - start) / (end - start)) * 100));
  }

  function updateHero(status, minutes) {
    const heroNow = document.getElementById("heroNow");
    const stateLabel = document.getElementById("stateLabel");
    const currentTitle = document.getElementById("currentTitle");
    const currentTime = document.getElementById("currentTime");
    const remainingTime = document.getElementById("remainingTime");
    const blockRow = document.getElementById("blockProgressRow");
    const blockFill = document.getElementById("blockFill");
    const blockPercent = document.getElementById("blockPercent");
    const nextTitle = document.getElementById("nextTitle");
    const nextTime = document.getElementById("nextTime");

    heroNow.classList.remove("mode-active", "mode-phone", "mode-transition", "mode-before", "mode-sleep");

    if (status.mode === "before") {
      heroNow.classList.add("mode-before");
      const wait = timeToMinutes(status.next.start) - minutes;
      stateLabel.textContent = "Soon";
      currentTitle.textContent = "The routine has not started yet";
      currentTime.textContent = "Starts at 04:30";
      remainingTime.textContent = "Starts in " + minutesToText(wait);
      blockRow.style.display = "none";
      nextTitle.textContent = status.next.title;
      nextTime.textContent = formatRange(status.next);
      return;
    }

    if (status.mode === "transition") {
      heroNow.classList.add("mode-transition");
      const wait = timeToMinutes(status.next.start) - minutes;
      stateLabel.textContent = "Transition";
      currentTitle.textContent = "Prepare for " + status.next.title;
      currentTime.textContent = "No active block";
      remainingTime.textContent = "Starts in " + minutesToText(wait);
      blockRow.style.display = "none";
      nextTitle.textContent = status.next.title;
      nextTime.textContent = formatRange(status.next);
      return;
    }

    if (status.mode === "sleep") {
      heroNow.classList.add("mode-sleep");
      stateLabel.textContent = "Sleep";
      currentTitle.textContent = "Time to sleep";
      currentTime.textContent = "From 20:45";
      remainingTime.textContent = "Routine complete";
      blockRow.style.display = "none";
      nextTitle.textContent = routine[0].title;
      nextTime.textContent = "Tomorrow · " + formatRange(routine[0]);
      return;
    }

    const current = status.current;
    const end = current.end === "24:00" ? 1440 : timeToMinutes(current.end);
    heroNow.classList.add(current.phone ? "mode-phone" : "mode-active");
    stateLabel.textContent = current.phone ? "Phone" : "Now";
    currentTitle.textContent = current.title;
    currentTime.textContent = formatRange(current);
    remainingTime.textContent = "Left: " + minutesToText(end - minutes);

    blockRow.style.display = "flex";
    const pct = activityProgress(current, minutes);
    blockFill.style.width = pct + "%";
    blockPercent.textContent = Math.round(pct) + "%";

    nextTitle.textContent = status.next.title;
    nextTime.textContent = formatRange(status.next);
  }

  function updateDayProgress(minutes) {
    let pct = 0;
    if (minutes >= routineStartMin && minutes <= routineEndMin) {
      pct = ((minutes - routineStartMin) / (routineEndMin - routineStartMin)) * 100;
    } else if (minutes > routineEndMin) {
      pct = 100;
    }
    pct = Math.max(0, Math.min(100, pct));

    document.getElementById("dayFill").style.width = pct + "%";
    document.getElementById("dayPercent").textContent = Math.round(pct) + "%";

    let status = "Not started yet";
    if (minutes >= routineStartMin && minutes < routineEndMin) status = "In progress";
    if (minutes >= routineEndMin) status = "Complete · Sleep";
    document.getElementById("dayStatus").textContent = status;
  }

  function updateRows(status, minutes) {
    let doneCount = 0;
    let scrollTarget = null;

    routine.forEach((item, index) => {
      const row = document.getElementById("row-" + index);
      const end = item.end === "24:00" ? 1440 : timeToMinutes(item.end);
      const statusEl = row.querySelector(".row-status");

      row.classList.remove("current", "next", "done", "future");

      if (status.currentIndex === index) {
        row.classList.add("current");
        statusEl.textContent = item.phone ? "Phone" : "Now";
        scrollTarget = row;
      } else if (status.nextIndex === index && status.mode !== "active" && status.mode !== "sleep") {
        row.classList.add("next");
        statusEl.textContent = "Next";
        if (!scrollTarget) scrollTarget = row;
      } else if (minutes >= end) {
        row.classList.add("done");
        statusEl.textContent = "Done";
        doneCount++;
      } else {
        row.classList.add("future");
        statusEl.textContent = "";
      }
    });

    const doneCountEl = document.getElementById("doneCount");
    if (doneCountEl) {
      doneCountEl.textContent = doneCount + " of " + routine.length + " blocks completed today";
    }

    if (!hasAutoScrolled && scrollTarget && !document.body.classList.contains("focus-mode")) {
      hasAutoScrolled = true;
      setTimeout(() => {
        const period = scrollTarget.closest(".period");
        const target = period && period.classList.contains("collapsed")
          ? period.querySelector(".period-head")
          : scrollTarget;
        target.scrollIntoView({ behavior: "smooth", block: "center" });
      }, 300);
    }
  }

  function setFocusMode(enabled) {
    document.body.classList.toggle("focus-mode", enabled);
    focusToggle.setAttribute("aria-pressed", String(enabled));
    focusToggle.setAttribute("aria-label", enabled ? "View full routine" : "Show only now");
    focusToggle.textContent = enabled ? "View full routine" : "Show only now";

    try {
      localStorage.setItem(focusStorageKey, enabled ? "1" : "0");
    } catch (error) {}
  }

  function loadFocusMode() {
    try {
      return localStorage.getItem(focusStorageKey) === "1";
    } catch (error) {
      return false;
    }
  }

  focusToggle.addEventListener("click", () => {
    setFocusMode(!document.body.classList.contains("focus-mode"));
  });

  function loadCollapsedPeriods() {
    try {
      const raw = localStorage.getItem(periodStorageKey);
      return raw ? JSON.parse(raw) : {};
    } catch (error) {
      return {};
    }
  }

  function saveCollapsedPeriods(collapsed) {
    try {
      localStorage.setItem(periodStorageKey, JSON.stringify(collapsed));
    } catch (error) {}
  }

  function setPeriodCollapsed(period, collapsed) {
    const head = period.querySelector(".period-head");
    period.classList.toggle("collapsed", collapsed);
    head.setAttribute("aria-expanded", String(!collapsed));
  }

  function initPeriodCollapse() {
    const saved = loadCollapsedPeriods();

    document.querySelectorAll(".period[data-period-key]").forEach((period) => {
      const key = period.dataset.periodKey;
      const head = period.querySelector(".period-head");
      setPeriodCollapsed(period, saved[key] === true);

      head.addEventListener("click", () => {
        const collapsed = !period.classList.contains("collapsed");
        setPeriodCollapsed(period, collapsed);
        saved[key] = collapsed;
        saveCollapsedPeriods(saved);
      });
    });
  }

  function tick() {
    const now = new Date();
    const minutes = now.getHours() * 60 + now.getMinutes();
    updateClock(now);
    const status = findCurrentAndNext(minutes);
    updateHero(status, minutes);
    updateDayProgress(minutes);
    updateRows(status, minutes);
  }

  setFocusMode(loadFocusMode());
  initPeriodCollapse();
  buildRows();
  tick();
  setInterval(tick, 1000);
</script>
</body>
</html>
